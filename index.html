<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>Arıza Bildirim Formu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body>
    <!-- Açılış Ekranı (Splash Screen) -->
    <div class="splash-screen">
        <img src="AKGLOG.png" alt="AKG Logo" class="splash-logo">
        <h2 class="splash-text">Bakım Sistemine<br>Hoş Geldiniz</h2>
    </div>

    <div class="container" style="padding-top: 0.5rem;">
        <div class="glass-panel" style="padding-top: 1rem;">
            
            <form id="faultForm" class="stepper-form">
                
                <!-- Adım 1: Kimlik -->
                <div class="step-container active" id="step1">
                    <div class="step-header" onclick="goToStep(1)">
                        <div class="step-number">1</div>
                        <div class="step-title">
                            <h3>Kimlik Bilgisi</h3>
                            <span class="step-summary" id="summary1"></span>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="form-group">
                            <label for="userName">Arızayı Bildiren (Ad Soyad)</label>
                            <input type="text" id="userName" required placeholder="Örn: Ahmet Yılmaz">
                        </div>
                        <button type="button" class="btn-next" onclick="nextStep(1)">İleri (Tamam) →</button>
                    </div>
                </div>

                <!-- Adım 2: Konum -->
                <div class="step-container" id="step2">
                    <div class="step-header" onclick="goToStep(2)">
                        <div class="step-number">2</div>
                        <div class="step-title">
                            <h3>Arıza Konumu</h3>
                            <span class="step-summary" id="summary2"></span>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="costCenter">1. Bölümler / Maliyet Merkezi</label>
                                <select id="costCenter" required>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="machine">2. Makineler / Ekipmanlar</label>
                                <select id="machine" required>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" class="btn-next" onclick="nextStep(2)">İleri (Tamam) →</button>
                    </div>
                </div>

                <!-- Adım 3: İş Detayı -->
                <div class="step-container" id="step3">
                    <div class="step-header" onclick="goToStep(3)">
                        <div class="step-number">3</div>
                        <div class="step-title">
                            <h3>Vardiya ve Tür</h3>
                            <span class="step-summary" id="summary3"></span>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="shift">3. Vardiya</label>
                                <select id="shift" required>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="jobType">4. İş Türü</label>
                                <select id="jobType" required>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" class="btn-next" onclick="nextStep(3)">İleri (Tamam) →</button>
                    </div>
                </div>

                <!-- Adım 4: Detaylar & Gönder -->
                <div class="step-container" id="step4">
                    <div class="step-header" onclick="goToStep(4)">
                        <div class="step-number">4</div>
                        <div class="step-title">
                            <h3>Açıklama ve Fotoğraf</h3>
                            <span class="step-summary" id="summary4"></span>
                        </div>
                    </div>
                    <div class="step-content">
                        <div class="form-group">
                            <label for="description">Arıza / İstek Açıklaması</label>
                            <textarea id="description" rows="3" required placeholder="Sorunu detaylıca açıklayın..."></textarea>
                        </div>
                        <div class="form-group" style="margin-top: 1rem; text-align: left;">
                            <button type="button" id="openPhotoModalBtn" style="background: transparent; color: var(--text-secondary); border: none; padding: 0; display: inline-flex; align-items: center; justify-content: flex-start; gap: 0.5rem; width: auto; font-size: 0.95rem; cursor: pointer;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                <span id="photoCompactText">Fotoğraf Ekle (Opsiyonel)</span>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- ALT NAVİGASYON (BOTTOM NAVIGATION) -->
    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>Takip</span>
        </a>
        
        <div class="nav-center-wrap">
            <!-- Dıştaki buton form göndereceği için form='faultForm' özelliği eklendi -->
            <button type="submit" form="faultForm" id="submitBtn" class="nav-center-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" x2="11" y1="2" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
            <span class="nav-center-label">GÖNDER</span>
        </div>
        
        <a href="#" onclick="adminLogin()" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <span>Admin</span>
        </a>
    </div>

    <!-- Fotoğraf Seçim Modalı -->
    <div id="photoSelectionModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 320px; text-align: center; padding: 1.5rem; background: var(--bg-color);">
            <div style="display: flex; justify-content: flex-end;">
                <button type="button" class="close-modal" onclick="document.getElementById('photoSelectionModal').classList.add('hidden')" style="color: var(--text-primary); font-size: 1.5rem; background: none; border: none; cursor: pointer;">×</button>
            </div>
            <h3 style="margin-bottom: 1.5rem; color: var(--text-primary);">Fotoğraf Ekle</h3>
            
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
            <input type="file" id="fileInput" accept="image/*" class="hidden">
            
            <button type="button" onclick="document.getElementById('cameraInput').click()" style="width: 100%; background: var(--accent); color: white; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 1rem; border: none; cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Kameradan Çek
            </button>
            
            <button type="button" onclick="document.getElementById('fileInput').click()" style="width: 100%; background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent); border-radius: 12px; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 1rem; cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                Dosyalardan Seç
            </button>
        </div>
    </div>

    <!-- Gönderim / Başarı Modalı -->
    <div id="submissionModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 400px; text-align: center; padding: 2rem; background: var(--bg-color);">
            
            <!-- Aşama 1: Yükleniyor -->
            <div id="loadingState">
                <!-- Şık CSS Yükleniyor Çemberi -->
                <div style="display: inline-block; width: 48px; height: 48px; border: 4px solid rgba(59, 130, 246, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 1rem;"></div>
                <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">Talebiniz Gönderiliyor...</h3>
                <p style="color: var(--text-secondary); font-size: 0.9rem;" id="loadingSubText">Lütfen bekleyin</p>
                <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            </div>

            <!-- Aşama 2: Başarılı & Seçenekler -->
            <div id="successState" class="hidden">
                <div style="width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); color: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">Kayıt Başarılı!</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Ne yapmak istersiniz?</p>
                
                <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <button type="button" onclick="window.location.href='dashboard.html'" style="background: var(--accent); color: white; border-radius: 12px; padding: 1rem; border: none; font-weight: 600; font-size: 1rem; display:flex; justify-content:center; align-items:center; gap: 0.5rem; width:100%; cursor:pointer;">
                        🔍 Arıza Takip Paneline Git
                    </button>
                    <button type="button" onclick="window.startNewForm()" style="background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent); border-radius: 12px; padding: 1rem; font-weight: 600; font-size: 1rem; display:flex; justify-content:center; align-items:center; gap: 0.5rem; width:100%; cursor:pointer;">
                        📝 Yeni Form Doldur
                    </button>
                    <button type="button" onclick="window.closeSystem()" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; padding: 1rem; font-weight: 600; font-size: 1rem; display:flex; justify-content:center; align-items:center; gap: 0.5rem; width:100%; cursor:pointer;">
                        ❌ Sistemi Kapat (<span id="closeCountdown">10</span>)
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Admin Giriş Modalı -->
    <div id="adminLoginModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 350px; text-align: center; padding: 2rem; background: var(--bg-color);">
            <div style="display: flex; justify-content: flex-end;">
                <button type="button" class="close-modal" onclick="document.getElementById('adminLoginModal').classList.add('hidden')" style="color: var(--text-primary); font-size: 1.5rem; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 1rem;">×</button>
            </div>
            
            <div style="width: 56px; height: 56px; background: rgba(245, 158, 11, 0.1); color: var(--warning); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </div>
            
            <h3 style="color: var(--text-primary); margin-bottom: 0.5rem; font-weight: 700;">Admin Girişi</h3>
            <p style="color: var(--danger); font-size: 0.85rem; font-weight: 600; margin-bottom: 1.5rem;">⚠️ Giriş yaptığınızda yöneticiye mesaj gönderilecektir.</p>
            
            <input type="password" id="adminPasswordInput" placeholder="Şifrenizi Girin" style="width: 100%; text-align: center; font-size: 1.2rem; letter-spacing: 0.2rem; margin-bottom: 1rem;">
            
            <button type="button" onclick="submitAdminModalLogin()" style="width: 100%; background: #111827; color: var(--accent); border-radius: 12px; padding: 1rem; border: none; font-weight: 700; cursor: pointer;">Giriş Yap</button>
        </div>
    </div>

    <!-- Firebase SDK'ları -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="app.js?v=2.1"></script>
</body>
</html>
